version: '3.8'

services:
  jarvis-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: jarvis-api
    restart: unless-stopped
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HA_TOKEN=${HA_TOKEN}
      - HA_URL=http://localhost:8123
      - API_PORT=8000
      - API_HOST=0.0.0.0
    
    ports:
      - "8000:8000"  # Interface Web
    
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./static:/app/static

    # Audio device is optional. Remove these lines if /dev/snd is unavailable.
    # devices:
    #   - /dev/snd
    #
    # group_add:
    #   - audio

  jarvis-cli:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jarvis-cli
    restart: unless-stopped
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HA_TOKEN=${HA_TOKEN}
      - HA_URL=http://localhost:8123
    
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs

    # Audio device is optional. Remove these lines if /dev/snd is unavailable.
    # devices:
    #   - /dev/snd
    #
    # group_add:
    #   - audio
    
    # depends_on:
    #   - home-assistant
    
    # Décommenter pour lancer en mode CLI
    # command: python src/jarvis.py

