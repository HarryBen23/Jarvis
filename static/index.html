<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Iron Man AI</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="jarvis-container">
        <!-- Particules de fond -->
        <div class="particle-field" id="particle-field"></div>

        <!-- Orbe central Jarvis -->
        <div class="orb-wrapper">
            <div class="orb-container">
                <div class="orb-core"></div>
                <div class="orb-pulse"></div>
                <div class="orb-rings">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <div class="ring ring-3"></div>
                </div>
                <div class="orb-glow"></div>
            </div>
            
            <!-- Indicateur de statut -->
            <div class="status-indicator">
                <span id="api-status" class="status-dot api"></span>
                <span id="ha-status" class="status-dot ha"></span>
                <span id="ai-status" class="status-dot ai"></span>
            </div>
        </div>

        <!-- Banneau d'avertissement pour le microphone -->
        <div id="mic-warning-banner" class="warning-banner" style="display: none;">
            <div class="warning-content">
                <div class="warning-icon">⚠️</div>
                <div class="warning-text">
                    <strong>Microphone non disponible</strong>
                    <p>La capture vocale nécessite HTTPS, localhost ou une IP locale. Actuellement: <code id="current-url"></code></p>
                </div>
            </div>
        </div>

        <!-- Interface de commande -->
        <div class="control-panel">
            <div class="command-input-group">
                <input 
                    type="text" 
                    id="text-input" 
                    placeholder="Dites quelque chose..."
                    onkeypress="handleKeyPress(event)"
                    class="command-input"
                >
            </div>

            <div class="control-buttons">
                <button id="record-btn" class="btn-voice" onclick="toggleRecording()">
                    🎤 Voix
                </button>
                <button class="btn-send" onclick="sendText()">
                    Envoyer
                </button>
                <button class="btn-settings" onclick="toggleAudioSettings()" title="Paramètres audio">
                    ⚙️
                </button>
            </div>

            <!-- Paramètres audio -->
            <div id="audio-settings" class="audio-settings" style="display: none;">
                <h3>🔊 Paramètres Audio</h3>
                <div class="settings-group">
                    <label for="mic-select">Microphone:</label>
                    <select id="mic-select" class="select-input">
                        <option value="">Périphérique par défaut</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label for="speaker-select">Haut-parleur:</label>
                    <select id="speaker-select" class="select-input">
                        <option value="">Périphérique par défaut</option>
                    </select>
                </div>
                <button class="btn-secondary" onclick="testAudio()">
                    🔊 Tester le son
                </button>
            </div>

            <!-- Réponse de Jarvis -->
            <div id="response-card" class="jarvis-response">
                <div id="response-text" class="response-text empty">En attente...</div>
                <div id="error-message" class="error-message"></div>
            </div>

            <!-- Appareils Home Assistant -->
            <div id="entities-section" class="entities-section" style="display: none;">
                <h3>Appareils</h3>
                <div id="entity-list" class="entity-list"></div>
            </div>

            <!-- Clé OpenAI -->
            <div id="openai-key-section" class="api-key-section">
                <h3>Clé OpenAI</h3>
                <div class="command-input-group">
                    <input
                        type="password"
                        id="openai-key-input"
                        placeholder="sk-..."
                        class="command-input api-key-input"
                    >
                    <button class="btn-send" onclick="saveOpenAIKey()">
                        Sauvegarder
                    </button>
                </div>
                <div id="openai-key-status" class="response-text empty">
                    OpenAI non configuré
                </div>
            </div>
        </div>

        <!-- Texte de marque -->
        <div class="brand-text">J.A.R.V.I.S</div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
